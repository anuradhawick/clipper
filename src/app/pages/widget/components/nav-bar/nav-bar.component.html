<div
  style="visibility: hidden; position: fixed"
  [style.left]="contextMenuPosition.x"
  [style.top]="contextMenuPosition.y"
  [matMenuTriggerFor]="activeMenu()"
></div>
<div
  class="m-1 grid grid-cols-[auto_1fr_auto] items-center gap-2 rounded-lg border border-solid bg-slate-50/30 p-1 shadow-lg"
>
  <div class="flex items-center gap-1">
    <button
      mat-mini-fab
      [routerLink]="''"
      (contextmenu)="onRightClick($event, clipboardMenu)"
      matBadge="-"
      matBadgeSize="small"
      [matBadgeHidden]="clipboardHistoryService.running()"
      matTooltip="Clipboard history"
      matTooltipShowDelay="1000"
    >
      <mat-icon>attach_file</mat-icon>
    </button>
    <button
      mat-mini-fab
      [routerLink]="['notes']"
      (contextmenu)="onRightClick($event, notesMenu)"
      matTooltip="Notes"
      matTooltipShowDelay="1000"
    >
      <mat-icon>notes</mat-icon>
    </button>
    <button
      mat-mini-fab
      [routerLink]="['files']"
      (contextmenu)="onRightClick($event, fileMenu)"
      matTooltip="Files"
      matTooltipShowDelay="1000"
    >
      <mat-icon>folder_copy</mat-icon>
    </button>
    <button
      mat-mini-fab
      [routerLink]="['settings']"
      matTooltip="Settings"
      matTooltipShowDelay="1000"
    >
      <mat-icon>settings</mat-icon>
    </button>
  </div>
  <div class="min-w-0 px-2 text-center text-lg font-bold">
    @if (showSearch()) {
      <mat-form-field
        class="search-field m-0 w-[300px]"
        subscriptSizing="dynamic"
        appearance="outline"
      >
        <input
          #searchInput
          matInput
          type="text"
          placeholder="Search {{ pageTitle() }}"
          [value]="searchQuery()"
          (input)="searchQuery.set(searchInput.value)"
        />
        <button
          mat-icon-button
          matSuffix
          type="button"
          aria-label="Cancel search"
          (click)="clearSearch(searchInput)"
        >
          <mat-icon>close</mat-icon>
        </button>
      </mat-form-field>
    } @else {
      {{ pageTitle() | titlecase }}
    }
  </div>
  <div class="flex items-center justify-end gap-1">
    @if (searchable()) {
      <button mat-mini-fab (click)="toggleSearch()">
        @if (showSearch()) {
          <mat-icon>search_off</mat-icon>
        } @else {
          <mat-icon>search</mat-icon>
        }
      </button>
    }
    <button mat-mini-fab (click)="windowActionsService.openManagerWindow()">
      <mat-icon>more_vert</mat-icon>
    </button>
    <button mat-mini-fab (click)="windowActionsService.hideWindow()">
      <mat-icon>visibility_off</mat-icon>
    </button>
  </div>
</div>

<mat-menu #clipboardMenu="matMenu">
  @if (clipboardHistoryService.running()) {
    <button mat-menu-item (click)="clipboardHistoryService.pause()">
      <mat-icon>pause</mat-icon>
      <span>Pause watcher</span>
    </button>
  } @else {
    <button mat-menu-item (click)="clipboardHistoryService.resume()">
      <mat-icon>play_arrow</mat-icon>
      <span>Resume watcher</span>
    </button>
  }
  <button mat-menu-item (click)="clearClipboard()">
    <mat-icon>delete_sweep</mat-icon>
    <span>Clear clipboard history</span>
  </button>
</mat-menu>

<mat-menu #notesMenu="matMenu">
  <button
    mat-menu-item
    [routerLink]="['notes', 'new']"
    queryParamsHandling="preserve"
  >
    <mat-icon>edit_note</mat-icon>
    <span>New note</span>
  </button>
  <button mat-menu-item (click)="deleteAllNotes()">
    <mat-icon>delete_sweep</mat-icon>
    <span>Delete all notes</span>
  </button>
</mat-menu>

<mat-menu #fileMenu="matMenu">
  <button mat-menu-item (click)="deleteAllFiles()">
    <mat-icon>clear_all</mat-icon>
    <span>Delete all files</span>
  </button>
</mat-menu>
