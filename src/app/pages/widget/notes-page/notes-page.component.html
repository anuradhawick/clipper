<div class="flex h-full min-h-0 flex-col overflow-hidden">
  @if (isCreatingNote()) {
    <div class="min-h-0 flex-1 overflow-auto">
      <router-outlet />
    </div>
  } @else {
    <router-outlet />

    @if (notesService.notes().length) {
      <div class="min-h-0 flex-1 overflow-hidden">
        <cdk-virtual-scroll-viewport
          class="notes-viewport h-full w-full overflow-x-hidden"
          [itemSize]="itemHeightPx"
          [minBufferPx]="minBufferPx"
          [maxBufferPx]="maxBufferPx"
        >
          <app-note-item
            *cdkVirtualFor="
              let note of notesService.notes();
              trackBy: trackByNoteId
            "
            [note]="note"
            (copyClicked)="notesService.copy(note.id)"
            (deleteClicked)="notesService.delete(note.id)"
            (contentUpdated)="notesService.update(note.id, $event)"
          />
        </cdk-virtual-scroll-viewport>
      </div>
    } @else {
      <div class="m-1 text-white">Your notes will appear here! 📖</div>
    }
  }
</div>
