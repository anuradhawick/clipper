<div class="wrapper flex min-h-full flex-col gap-3 p-3 pb-4">
  <div>
    <div class="text-lg font-bold">New Note</div>
    <div class="text-sm text-slate-700">
      Write a note and keep it in your notes list.
    </div>
  </div>

  <div
    class="relative min-h-40 rounded-lg border border-dashed border-slate-400/70 bg-white/35 px-4 pb-3 pt-4"
  >
    @if (!newEntry()) {
      <div
        class="pointer-events-none absolute left-4 top-4 font-mono text-sm leading-6 text-slate-500"
      >
        Start typing your note here...
      </div>
    }
    <div
      #editor
      [contentEditable]="true"
      class="block min-h-32 w-full whitespace-pre-wrap break-all font-mono text-sm leading-6 outline-none"
      [textContent]="entry()"
      (input)="change($event)"
      aria-label="New note content"
      role="textbox"
    ></div>
  </div>

  <div class="flex justify-end gap-2">
    <button
      mat-mini-fab
      [routerLink]="['/clipper', 'notes']"
      queryParamsHandling="preserve"
      matTooltip="Cancel"
    >
      <mat-icon>close</mat-icon>
    </button>
    <button
      mat-mini-fab
      color="primary"
      (click)="save()"
      [disabled]="!newEntry().trim()"
      matTooltip="Save note"
    >
      <mat-icon>save</mat-icon>
    </button>
  </div>
</div>
