<div
  aria-hidden="true"
  style="visibility: hidden; position: absolute; pointer-events: none"
  [style.left]="contextMenuPosition.x"
  [style.top]="contextMenuPosition.y"
  [matMenuTriggerFor]="linkMenu"
></div>
<div
  class="relative m-1 mt-0 flex h-full min-w-0 overflow-hidden rounded-lg border border-solid bg-slate-50/30 shadow-lg"
>
  <div class="absolute bottom-0 text-xs text-slate-700 px-3">
    Added: {{ bookmarkEntry().timestamp | date: "yyyy-MM-dd HH:mm" }}
  </div>
  <div class="mb-4 flex min-h-0 flex-1 overflow-hidden rounded-lg p-2">
    <div class="h-full min-w-0 overflow-auto">
      <div class="mb-2 whitespace-pre-wrap font-mono">
        <span
          class="cursor-pointer break-all italic underline"
          (click)="openUrl(bookmarkEntry().url)"
          (contextmenu)="onLinkRightClick($event, bookmarkEntry().url)"
          >{{ bookmarkEntry().url }}</span
        >
        <br />
        <div class="my-1 flex flex-row items-start space-x-2">
          @if (bookmarkEntry().image?.length) {
            <img
              [src]="processImage(bookmarkEntry().image!)"
              alt="Image"
              class="h-auto max-w-[180px] object-contain"
            />
          }
          <div class="whitespace-pre-wrap break-all text-sm text-slate-800">
            {{ bookmarkEntry().text }}
          </div>
        </div>
      </div>
    </div>
  </div>
  <div class="mt-3 flex flex-row justify-end space-x-1">
    <div class="flex w-[50px] flex-col items-center space-y-2">
      <button
        mat-mini-fab
        class="w-full"
        aria-label="Refresh bookmark metadata"
        (click)="refreshClicked.emit()"
      >
        <mat-icon>refresh</mat-icon>
      </button>
      <button
        mat-mini-fab
        class="w-full"
        aria-label="Show bookmark QR code"
        (click)="showQRCode(bookmarkEntry().url)"
      >
        <mat-icon>qr_code_2</mat-icon>
      </button>
    </div>
    <div class="flex flex-col space-y-2 w-[50px]">
      <button
        mat-mini-fab
        class="w-full"
        aria-label="Expand bookmark preview"
        (click)="openExpandedView()"
      >
        <mat-icon>zoom_out_map</mat-icon>
      </button>
      <button
        mat-mini-fab
        class="w-full"
        aria-label="Delete bookmark"
        (click)="deleteClicked.emit()"
      >
        <mat-icon>delete</mat-icon>
      </button>
    </div>
    <div class="flex w-[50px] flex-col space-y-2">
      <button
        mat-mini-fab
        class="w-full"
        aria-label="Tag bookmark"
        (click)="openTagDialog()"
      >
        <mat-icon>label</mat-icon>
      </button>
    </div>
  </div>
</div>

<mat-menu #linkMenu="matMenu">
  <button mat-menu-item (click)="openUrl(clickedUrl())">
    <mat-icon>open_in_new</mat-icon>
    <span>Open in browser</span>
  </button>
  <button mat-menu-item (click)="showQRCode()">
    <mat-icon>qr_code_2</mat-icon>
    <span>Show QR code</span>
  </button>
</mat-menu>
