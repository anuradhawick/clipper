<div class="flex h-full min-h-0 flex-col overflow-hidden">
  <div class="wrapper items-center">
    <div class="m-1 flex w-full items-center justify-between">
      <button
        mat-mini-fab
        (click)="toggleSearch()"
        matTooltip="Toggle search bar"
        matTooltipShowDelay="1000"
      >
        @if (showSearch()) {
          <mat-icon>search_off</mat-icon>
        } @else {
          <mat-icon>search</mat-icon>
        }
      </button>
      <div class="flex justify-end space-x-1">
        <button
          mat-mini-fab
          (click)="clearBookmarks()"
          matTooltip="Clear all bookmarks"
          matTooltipShowDelay="1000"
        >
          <mat-icon>delete_sweep</mat-icon>
        </button>
      </div>
    </div>
    <div
      class="absolute mx-auto w-full items-center text-center text-lg font-bold"
    >
      @if (showSearch()) {
        <mat-form-field
          class="search-field m-0 w-[600px]"
          subscriptSizing="dynamic"
          appearance="outline"
        >
          <input
            #searchInput
            matInput
            type="text"
            placeholder="Search bookmarks"
            [value]="searchQuery()"
            (input)="searchQuery.set(searchInput.value)"
          />
          <button
            mat-icon-button
            matSuffix
            type="button"
            aria-label="Cancel search"
            (click)="clearSearch(searchInput)"
          >
            <mat-icon>close</mat-icon>
          </button>
        </mat-form-field>
      } @else {
        Bookmarks
      }
    </div>
  </div>

  @if (bookmarkEntries().length) {
    <div class="min-h-0 flex-1 overflow-hidden">
      <cdk-virtual-scroll-viewport
        class="bookmarks-viewport h-full w-full overflow-x-hidden"
        [itemSize]="itemHeightPx"
        [minBufferPx]="minBufferPx"
        [maxBufferPx]="maxBufferPx"
      >
        <app-bookmark-item
          *cdkVirtualFor="
            let bookmarkEntry of bookmarkEntries();
            trackBy: trackByBookmarkId
          "
          [bookmarkEntry]="bookmarkEntry"
          (copyClicked)="bs.copy(bookmarkEntry.id)"
          (deleteClicked)="bs.delete(bookmarkEntry.id)"
          (openClicked)="bs.open(bookmarkEntry.id)"
          (refreshClicked)="bs.update(bookmarkEntry.id)"
        />
      </cdk-virtual-scroll-viewport>
    </div>
  } @else {
    <div class="m-1 dark:text-white">
      Your bookmark entries will appear here! 📖
    </div>
  }
</div>
