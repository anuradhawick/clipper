<div class="flex h-full min-h-0 flex-col overflow-hidden">
  <div class="wrapper items-center">
    <div class="m-1 flex w-full items-center justify-center text-lg font-bold">
      Tags
    </div>
  </div>

  <div class="min-h-0 flex-1 overflow-auto">
    <div class="wrapper p-3">
      <div class="flex w-full items-center gap-3">
        <mat-form-field
          class="tag-input-field m-0 w-[300px]"
          subscriptSizing="dynamic"
          appearance="outline"
        >
          <input
            #newTagInput
            matInput
            type="text"
            placeholder="New tag"
            [value]="newTag()"
            (input)="newTag.set(newTagInput.value)"
            (keydown.enter)="createTag()"
          />
        </mat-form-field>
        <div class="flex flex-wrap items-center justify-start gap-2">
          @for (color of tagColors; track color.value) {
            <button
              type="button"
              class="tag-swatch tag-swatch-{{ color.value }}"
              [class.tag-swatch-selected]="newKind() === color.value"
              [attr.aria-label]="color.label"
              [matTooltip]="color.label"
              (click)="setNewKind(color.value)"
            ></button>
          }
        </div>
        <div class="min-w-0 flex-1"></div>
        <button
          mat-mini-fab
          type="button"
          (click)="createTag()"
          [disabled]="!newTag().trim()"
          matTooltip="Create tag"
          matTooltipShowDelay="1000"
        >
          <mat-icon>add</mat-icon>
        </button>
      </div>
    </div>

    @if (tagsService.tags().length) {
      <div class="grid grid-cols-1 gap-1 md:grid-cols-2">
        @for (tag of tagsService.tags(); track tag.id) {
          <app-tag-item
            [tag]="tag"
            (editClicked)="editTag($event)"
            (deleteClicked)="deleteTag($event)"
          />
        }
      </div>
    } @else {
      <div class="m-1 dark:text-white">Create tags to organize your items.</div>
    }
  </div>
</div>
