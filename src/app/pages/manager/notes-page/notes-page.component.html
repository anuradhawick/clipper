<div class="flex h-full min-h-0 flex-col overflow-hidden">
  <div class="wrapper items-center">
    <div class="m-1 flex w-full justify-between">
      <button
        mat-mini-fab
        (click)="toggleSearch()"
        matTooltip="Toggle search bar"
        matTooltipShowDelay="1000"
      >
        @if (showSearch()) {
          <mat-icon>search_off</mat-icon>
        } @else {
          <mat-icon>search</mat-icon>
        }
      </button>
      <div class="flex space-x-1">
        <button
          mat-mini-fab
          [routerLink]="['new']"
          queryParamsHandling="preserve"
          matTooltip="Create a new note"
          matTooltipShowDelay="1000"
        >
          <mat-icon>edit_note</mat-icon>
        </button>
        <button
          mat-mini-fab
          (click)="deleteNotes()"
          matTooltip="Clear all notes"
          matTooltipShowDelay="1000"
        >
          <mat-icon>delete_sweep</mat-icon>
        </button>
      </div>
    </div>
    <div
      class="absolute mx-auto w-full items-center text-center text-lg font-bold"
    >
      @if (showSearch()) {
        <mat-form-field
          class="search-field m-0 w-[600px]"
          subscriptSizing="dynamic"
          appearance="outline"
        >
          <input
            #searchInput
            matInput
            type="text"
            placeholder="Search notes"
            [value]="searchQuery()"
            (input)="searchQuery.set(searchInput.value)"
          />
          <button
            mat-icon-button
            matSuffix
            type="button"
            aria-label="Cancel search"
            (click)="clearSearch(searchInput)"
          >
            <mat-icon>close</mat-icon>
          </button>
        </mat-form-field>
      } @else {
        Notes
      }
    </div>
  </div>
  @if (isCreatingNote()) {
    <div class="min-h-0 flex-1 overflow-auto">
      <router-outlet />
    </div>
  } @else {
    <router-outlet />

    @if (filteredNotes().length) {
      <div class="min-h-0 flex-1 overflow-hidden">
        <cdk-virtual-scroll-viewport
          class="notes-viewport h-full w-full overflow-x-hidden"
          [itemSize]="itemHeightPx"
          [minBufferPx]="minBufferPx"
          [maxBufferPx]="maxBufferPx"
        >
          <app-note-item
            *cdkVirtualFor="let note of filteredNotes(); trackBy: trackByNoteId"
            [note]="note"
            (copyClicked)="notesService.copy(note.id)"
            (deleteClicked)="notesService.delete(note.id)"
            (contentUpdated)="notesService.update(note.id, $event)"
          />
        </cdk-virtual-scroll-viewport>
      </div>
    } @else {
      <div class="m-1 text-white">Your notes will appear here! 📖</div>
    }
  }
</div>
